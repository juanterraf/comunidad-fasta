services:
  db:
    image: postgres:16-alpine
    container_name: comfasta-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-comfasta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comfasta}
      POSTGRES_DB: ${POSTGRES_DB:-comfasta}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comfasta} -d ${POSTGRES_DB:-comfasta}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
